name: Deploy Cø Lab to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Test site and teaching assets
        run: npm test
      - name: Build static site
        run: npm run build:pages
        env:
          NEXT_PUBLIC_BASE_PATH: /C0
      - name: Verify teaching export
        run: |
          test -f out/teaching/index.html
          test -f out/teaching/instructor-manual/2.1/teaching-c0-n-star-instructor-manual.pdf
          test -f out/teaching/student-materials/2.1/c0-n-star-student-session-resource-pack.pdf
          cmp output/pdf/teaching-c0-n-star-manual.pdf out/teaching/instructor-manual/2.1/teaching-c0-n-star-instructor-manual.pdf
          cmp output/pdf/c0-n-star-student-session-resource-pack.pdf out/teaching/student-materials/2.1/c0-n-star-student-session-resource-pack.pdf
          grep -q '/C0/teaching/instructor-manual/2.1/teaching-c0-n-star-instructor-manual.pdf' out/teaching/index.html
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
      - name: Upload static site
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
